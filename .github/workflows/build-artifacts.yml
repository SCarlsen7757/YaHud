# Reusable workflow: Builds all projects and uploads artifacts
name: Build Artifacts

on:
  workflow_call:
    inputs:
      version:
        description: "Version string for artifact naming"
        required: true
        type: string

jobs:
  build-relay:
    name: Build R3E.Relay (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Required for GitVersion

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x.x"

      - name: Restore dependencies
        run: dotnet restore R3E.Relay/R3E.Relay.csproj

      - name: Publish R3E.Relay
        run: |
          dotnet publish ./R3E.Relay/R3E.Relay.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/R3E.Relay-win-x64

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path ./publish/R3E.Relay-win-x64/* -DestinationPath ./R3E.Relay-win-x64-v${{ inputs.version }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: R3E.Relay-win-x64
          path: ./R3E.Relay-win-x64-v${{ inputs.version }}.zip
          retention-days: 7

  build-yahud-windows:
    name: Build R3E.YaHud (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Required for GitVersion

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x.x"

      - name: Restore dependencies
        run: dotnet restore R3E.YaHud/R3E.YaHud.csproj

      - name: Publish R3E.YaHud
        run: |
          dotnet publish ./R3E.YaHud/R3E.YaHud.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/R3E.YaHud-win-x64

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path ./publish/R3E.YaHud-win-x64/* -DestinationPath ./R3E.YaHud-win-x64-v${{ inputs.version }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: R3E.YaHud-win-x64
          path: ./R3E.YaHud-win-x64-v${{ inputs.version }}.zip
          retention-days: 7

  build-yahud-linux:
    name: Build R3E.YaHud (Linux x64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Required for GitVersion

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x.x"

      - name: Restore dependencies
        run: dotnet restore R3E.YaHud/R3E.YaHud.csproj

      - name: Publish R3E.YaHud
        run: |
          dotnet publish ./R3E.YaHud/R3E.YaHud.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/R3E.YaHud-linux-x64

      - name: Create ZIP archive
        run: |
          cd ./publish && zip -r ../R3E.YaHud-linux-x64-v${{ inputs.version }}.zip R3E.YaHud-linux-x64/*

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: R3E.YaHud-linux-x64
          path: ./R3E.YaHud-linux-x64-v${{ inputs.version }}.zip
          retention-days: 7

  build-yahud-appimage:
    name: Build R3E.YaHud (Linux AppImage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Required for GitVersion

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x.x"

      - name: Restore dependencies
        run: dotnet restore R3E.YaHud/R3E.YaHud.csproj

      - name: Publish R3E.YaHud into AppDir
        run: |
          dotnet publish ./R3E.YaHud/R3E.YaHud.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./AppDir/usr/bin

      - name: Assemble AppDir
        run: |
          install -m 755 packaging/appimage/AppRun ./AppDir/AppRun
          cp packaging/appimage/YaHud.desktop ./AppDir/
          cp packaging/appimage/yahud.png ./AppDir/
          cp packaging/appimage/yahud.png ./AppDir/.DirIcon

      - name: Build AppImage
        env:
          APPIMAGETOOL_VERSION: "1.9.1"
          APPIMAGETOOL_SHA256: "ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0"
          RUNTIME_VERSION: "20251108"
          RUNTIME_SHA256: "2fca8b443c92510f1483a883f60061ad09b46b978b2631c807cd873a47ec260d"
        run: |
          wget -q "https://github.com/AppImage/appimagetool/releases/download/${APPIMAGETOOL_VERSION}/appimagetool-x86_64.AppImage"
          wget -q "https://github.com/AppImage/type2-runtime/releases/download/${RUNTIME_VERSION}/runtime-x86_64"
          echo "${APPIMAGETOOL_SHA256}  appimagetool-x86_64.AppImage" | sha256sum -c -
          echo "${RUNTIME_SHA256}  runtime-x86_64" | sha256sum -c -
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run --runtime-file runtime-x86_64 ./AppDir ./YaHud-v${{ inputs.version }}-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: R3E.YaHud-appimage
          path: ./YaHud-v${{ inputs.version }}-x86_64.AppImage
          retention-days: 7
